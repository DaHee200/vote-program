<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voter | Swipe to Vote</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo-section">
            <div class="logo">VOTER</div>
            <div class="user-menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-muted)"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
        </div>
        <div class="categories" id="categoryContainer">
            <div class="category-tab active" data-category="">All</div>
            <div class="category-tab" data-category="POLITICS">정치</div>
            <div class="category-tab" data-category="ENTERTAINMENT">연예</div>
            <div class="category-tab" data-category="ETC">기타</div>
        </div>
        <div class="filters">
            <div class="filter-chip active" data-sort="latest">Latest</div>
            <div class="filter-chip" data-sort="popular">Popular</div>
        </div>
    </header>

    <main class="main-content">
        <div class="nav-btn nav-prev" id="prevBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </div>
        
        <div class="card-stack" id="cardStack">
            <!-- Cards will be injected here by main.js -->
            <div class="vote-card" id="loadingCard">
                <div class="question" style="color: var(--text-muted); font-size: 18px;">Loading votes...</div>
            </div>
        </div>

        <div class="nav-btn nav-next" id="nextBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
    </main>

    <footer>
        <div class="bottom-tab active" data-status="">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Feed</span>
        </div>
        <div class="bottom-tab" data-status="ongoing">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            <span>진행중</span>
        </div>
        <div class="bottom-tab" data-status="ended">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            <span>종료됨</span>
        </div>
    </footer>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
